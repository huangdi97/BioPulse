rules:
  - code: PHR-L1-001
    name: 统方禁止
    level: L1
    action: block
    severity: critical
    description: 禁止以任何形式获取、使用或泄露医疗机构处方数据（统方）
    detection:
      type: keyword_match
      field: notes
      keywords: ["处方量", "开方数", "统方", "处方统计", "开药量"]

  - code: PHR-L1-002
    name: 利益输送禁止
    level: L1
    action: block
    severity: critical
    description: 禁止向医务人员提供现金、礼品卡或其他形式的利益输送
    detection:
      type: threshold
      field: expenses
      operator: gte
      value: 500

  - code: PHR-L1-003
    name: 回扣红线
    level: L1
    action: block
    severity: critical
    description: 严禁以回扣、处方提成等方式诱导采购或处方行为
    detection:
      type: keyword_match
      field: notes
      keywords: ["回扣", "提成", "返点", "返利"]

  - code: PHR-L1-004
    name: 场所异常检测
    level: L1
    action: block
    severity: critical
    description: 检测并阻止在医疗机构内非指定区域进行的推广活动
    detection:
      type: field_check
      field: location_type
      operator: eq
      value: unauthorized

  - code: PHR-L1-005
    name: 备案身份校验
    level: L1
    action: block
    severity: critical
    description: 核验医药代表备案身份，备案信息与代表身份不符时阻止活动
    detection:
      type: field_check
      field: rep_verified
      operator: eq
      value: false
