chains:
  - name: "ејӮеёёвҶ’ж №еӣ вҶ’е»әи®®вҶ’ж•ҷз»ғ"
    trigger_event: "compliance.anomaly_detected"
    steps:
      - agent: "anomaly_analysis"
        action: "run_root_cause"
        timeout: 60
      - agent: "sales_suggestion"
        action: "generate_action_plan"
        wait_for: "anomaly_analysis"
      - agent: "sales_coach_analyst"
        action: "create_training_scenario"
        condition: "root_cause.type == 'compliance_violation'"

  - name: "е•ҶжңәжөҒеӨұвҶ’жғ…жҠҘвҶ’зӯ–з•Ҙи°ғж•ҙ"
    trigger_event: "opportunity.loss_detected"
    steps:
      - agent: "opportunity_scanner"
        action: "scan_competitor_activity"
      - agent: "sales_suggestion"
        action: "adjust_strategy"

  - name: "жӢңи®ҝе®ҢжҲҗвҶ’е»әи®®вҶ’зҹҘиҜҶжІүж·Җ"
    trigger_event: "visit.completed"
    steps:
      - agent: "sales_suggestion"
        action: "generate_action_plan"
      - agent: "knowledge_worker"
        action: "extract_insights"
        wait_for: "sales_suggestion"

  - name: "з«һе“ҒеҠЁжҖҒвҶ’жғ…жҠҘжҺЁйҖҒвҶ’зӯ–з•Ҙе»әи®®"
    trigger_event: "competitor.activity_detected"
    steps:
      - agent: "competitor_intel"
        action: "analyze_competitor_movement"
        timeout: 90
      - agent: "sales_suggestion"
        action: "generate_action_plan"
        wait_for: "competitor_intel"
      - agent: "notification_dispatcher"
        action: "push_to_rep_dashboard"
        wait_for: "sales_suggestion"