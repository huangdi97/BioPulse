version: "3.8"

services:
  cloud:
    build:
      context: .
      dockerfile: cloud/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data/cloud.db:/app/data/cloud.db
    env_file:
      - .env
    environment:
      - DSN=sqlite:///data/cloud.db
    networks:
      - yysd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  sales-coach:
    build:
      context: .
      dockerfile: sales_coach/Dockerfile
