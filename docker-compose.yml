version: "3.8"

services:
  cloud:
    build:
      context: .
      dockerfile: cloud/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data/cloud.db:/app/data/cloud.db
    env_file:
      - .env
    environment:
      - DSN=sqlite:///data/cloud.db
    networks:
      - yysd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  sales-coach:
    build:
      context: .
      dockerfile: sales-coach/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DSN=sqlite:///data/sales_coach.db
    networks:
      - yysd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  opportunity:
    build:
      context: .
      dockerfile: opportunity/Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - DSN=sqlite:///data/opportunity.db
    networks:
      - yysd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  assistant:
    build:
      context: .
      dockerfile: assistant/Dockerfile
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      - DSN=sqlite:///data/assistant.db
    networks:
      - yysd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  sales-assistant:
    build:
      context: .
      dockerfile: sales-assistant/Dockerfile
    ports:
      - "8004:8004"
    env_file:
      - .env
    environment:
      - DSN=sqlite:///data/sales_assistant.db
    networks:
      - yysd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  pharma-intel:
    build:
      context: .
      dockerfile: pharma_intel/Dockerfile
    ports:
      - "8006:8006"
    volumes:
      - ./data/pharma_intel.db:/app/data/pharma_intel.db
    env_file:
      - .env
    environment:
      - DSN=sqlite:///data/pharma_intel.db
    networks:
      - yysd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8006/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  management:
    build:
      context: .
      dockerfile: management/Dockerfile
    ports:
      - "8012:8012"
    volumes:
      - ./data/management.db:/app/data/management.db
    env_file:
      - .env
    environment:
      - DSN=sqlite:///data/management.db
    networks:
      - yysd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8012/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  clinical-ops:
    build:
      context: .
      dockerfile: clinical-ops/Dockerfile
    ports:
      - "8010:8010"
    env_file:
      - .env
    environment:
      - DSN=sqlite:///data/clinical_ops.db
    networks:
      - yysd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8010/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  patient-engage:
    build:
      context: .
      dockerfile: patient-engage/Dockerfile
    ports:
      - "8011:8011"
    env_file:
      - .env
    environment:
      - DSN=sqlite:///data/patient_engage.db
    networks:
      - yysd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8011/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  market-access:
    build:
      context: .
      dockerfile: market-access/Dockerfile
    ports:
      - "8007:8007"
    env_file:
      - .env
    environment:
      - DSN=sqlite:///data/market_access.db
    networks:
      - yysd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8007/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  agent-compliance-monitor:
    build:
      context: .
      dockerfile: cloud/Dockerfile
    command: python -m cloud.app.agent_entrypoint
    ports:
      - "8015:8015"
    environment:
      - AGENT_NAME=compliance_monitor
      - AGENT_PORT=8015
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    networks:
      - yysd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8015/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  agent-anomaly-analysis:
    build:
      context: .
      dockerfile: cloud/Dockerfile
    command: python -m cloud.app.agent_entrypoint
    ports:
      - "8016:8016"
    environment:
      - AGENT_NAME=anomaly_analysis
      - AGENT_PORT=8016
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    networks:
      - yysd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8016/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - yysd-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  yysd-net:
    driver: bridge

volumes:
  redis_data:
