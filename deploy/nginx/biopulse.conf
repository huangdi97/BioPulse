# ============================================================
# BioPulse · Nginx 生产配置
# 反向代理 + TLS 1.3/1.2 + 安全加固
# ============================================================

# ---------- 全局配置 ----------
user nginx;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    multi_accept on;
    worker_connections 2048;
    use epoll;
}

http {
    # ---------- 基础设置 ----------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    charset utf-8;
    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # ---------- 日志格式 ----------
    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"x_forwarded_for":"$http_x_forwarded_for"'
    '}';
    access_log /var/log/nginx/access.log json;

    # ---------- 速率限制 ----------
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;
    limit_req_status 429;

    # ---------- 上游服务定义 ----------
    upstream cloud { server 127.0.0.1:8000 max_fails=3 fail_timeout=10s; }
    upstream sales-coach { server 127.0.0.1:8001 max_fails=3 fail_timeout=10s; }
    upstream opportunity { server 127.0.0.1:8002 max_fails=3 fail_timeout=10s; }
    upstream sales-assistant { server 127.0.0.1:8003 max_fails=3 fail_timeout=10s; }
    upstream management { server 127.0.0.1:8012 max_fails=3 fail_timeout=10s; }
    upstream pharma-intel { server 127.0.0.1:8006 max_fails=3 fail_timeout=10s; }
    upstream market-access { server 127.0.0.1:8007 max_fails=3 fail_timeout=10s; }
    upstream clinical-ops { server 127.0.0.1:8010 max_fails=3 fail_timeout=10s; }
    upstream patient-engage { server 127.0.0.1:8011 max_fails=3 fail_timeout=10s; }

    # ---------- HTTP → HTTPS 强制跳转 ----------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ---------- HTTPS 主服务 ----------
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name biopulse.example.com;

        # ----- TLS 配置 -----
        ssl_certificate /etc/letsencrypt/live/biopulse.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/biopulse.example.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/biopulse.example.com/chain.pem;

        # 协议: TLS 1.3 优先, 兼容 TLS 1.2
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

        # DH 参数（生成: openssl dhparam -out /etc/nginx/dhparam.pem 2048）
        ssl_dhparam /etc/nginx/dhparam.pem;

        # Session 缓存
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS（6 个月）
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;

        # 其他安全头
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # ----- 静态资源缓存 -----
        location ~ ^/(assets|uploads)/ {
            root /var/www/biopulse;
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # ----- 健康检查 -----
        location /health {
            proxy_pass http://cloud;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 10s;
            access_log off;
        }

        # ----- 服务路由 -----
        # 通用反向代理配置块
        map $upstream_name $upstream_target {
            default http://cloud;
        }

        # Cloud API (核心)
        location /api/v1/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://cloud;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;

            # CORS
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
        }

        # 认证 (速率限制严格)
        location /auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://cloud;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Sales Coach
        location /sales-coach/ {
            limit_req zone=api burst=50 nodelay;
            rewrite ^/sales-coach(/.*)$ $1 break;
            proxy_pass http://sales-coach;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Opportunity
        location /opportunity/ {
            limit_req zone=api burst=50 nodelay;
            rewrite ^/opportunity(/.*)$ $1 break;
            proxy_pass http://opportunity;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Sales Assistant
        location /sales-assistant/ {
            limit_req zone=api burst=50 nodelay;
            rewrite ^/sales-assistant(/.*)$ $1 break;
            proxy_pass http://sales-assistant;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Management
        location /management/ {
            limit_req zone=api burst=50 nodelay;
            rewrite ^/management(/.*)$ $1 break;
            proxy_pass http://management;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Pharma Intel
        location /pharma-intel/ {
            limit_req zone=api burst=50 nodelay;
            rewrite ^/pharma-intel(/.*)$ $1 break;
            proxy_pass http://pharma-intel;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Market Access
        location /market-access/ {
            limit_req zone=api burst=50 nodelay;
            rewrite ^/market-access(/.*)$ $1 break;
            proxy_pass http://market-access;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Clinical Ops
        location /clinical-ops/ {
            limit_req zone=api burst=50 nodelay;
            rewrite ^/clinical-ops(/.*)$ $1 break;
            proxy_pass http://clinical-ops;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Patient Engage
        location /patient-engage/ {
            limit_req zone=api burst=50 nodelay;
            rewrite ^/patient-engage(/.*)$ $1 break;
            proxy_pass http://patient-engage;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # AI/Chat (长超时)
        location /ai/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://cloud;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
        }

        # Agent 轨迹
        location /agent/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://cloud;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ----- 拒绝非路由请求 -----
        location / {
            return 404;
        }
    }
}
