version: "3.8"

services:
  llm:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: biopulse-llm
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models:ro
    command:
      - --model
      - /models/qwen2.5-7b-instruct-q4_k_m.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --n-gpu-layers
      - "0"
      - --ctx-size
      - "4096"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  cloud-api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: biopulse-cloud
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
    environment:
      - AI_ROUTING_MODE=hybrid
      - AI_LOCAL_ENDPOINT=http://biopulse-llm:8080
      - AI_LOCAL_MODEL=qwen2.5-7b-instruct-q4_k_m
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - LOG_LEVEL=INFO
      - DB_PATH=/app/data/cloud.db
    depends_on:
      llm:
        condition: service_healthy
    restart: unless-stopped
