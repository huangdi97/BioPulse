任务：压缩 cloud/app/mdt_engine_router.py 从384行到≤300行

规则（严格执行）：
1. 不允许修改 import 行
2. 不允许修改 class/def 签名行（函数名、参数、类型注解原样保留）
3. 不允许修改任何逻辑代码（if/for/try/return/raise）
4. 不允许修改任何缩进层级
5. 允许的操作：
   a. Pydantic model 类合并为单行（如果字段≤3个）
   b. 函数之间的空行从2行减少为1行
   c. 长字符串模板压缩为单行（如 JSON format strings）
   d. docstring 压缩为单行或删除
   e. 注释行删除
   f. 函数体内相邻的空行删除
   g. 函数签名中每个参数占一行的，合并到同一行（用空格分隔）

举例：
- `"\\n\\n请以JSON格式输出你的观点："` + 后续多行 → 合并为单行 f"..."
- 函数定义 `def create_session(` 后面的多行参数 → 合并到一行
- 函数体第一行的空行 → 删除

输出：直接修改文件内容，要求语法正确。
确认方式：运行 python -c "import ast; ast.parse(open('cloud/app/mdt_engine_router.py').read()); print('OK')"
