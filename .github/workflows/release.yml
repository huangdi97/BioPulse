name: Release

on:
  release:
    types: [published]

jobs:
  release-apk:
    name: Build and upload APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
      - name: Install deps
        run: flutter pub get
      - name: Build APK (release)
        run: flutter build apk --release
      - name: Upload APK to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            build/app/outputs/flutter-apk/app-release.apk \
            --clobber

  release-exe:
    name: Build and upload Windows EXE
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
      - name: Install deps
        run: flutter pub get
      - name: Build EXE (release)
        run: flutter build windows --release
      - name: Upload EXE to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/runner/Release/* -DestinationPath one-cloud-app-windows.zip
          gh release upload "${{ github.event.release.tag_name }}" one-cloud-app-windows.zip --clobber
