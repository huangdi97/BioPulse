name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  mobile-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-apk-debug
          path: mobile_app/build/app/outputs/flutter-apk/*.apk

  mobile-exe:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --debug
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-exe-debug
          path: mobile_app/build/windows/x64/runner/Release/
