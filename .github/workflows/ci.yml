name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          pip install ruff
      - name: Ruff check
        run: ruff check
      - name: Debug env
        run: |
          python -c "import fastapi; print('fastapi', fastapi.__version__)"
          python -c "import sqlite3; print('sqlite3 OK')"
          python -c "import pytest; print('pytest', pytest.__version__)"
          python --version
      - name: Pytest
        run: |
          python -m pytest --version
          python -c "from cloud.app.main import app; print('app imported OK')"
          python -m pytest cloud/app/tests/test_auth.py -x --tb=long --no-cov -v

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - uses: actions/checkout@v4
      - name: dart analyze
        run: |
          if command -v dart; then
            dart analyze
          else
            echo "dart not available, skipping"
          fi

  docker:
    runs-on: ubuntu-latest
    needs: [test, web]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker compose build cloud sales-coach opportunity assistant sales-assistant pharma-intel management

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST 'cd /home/hermes/one-cloud-four-ends && git pull && ./scripts/deploy.sh'
