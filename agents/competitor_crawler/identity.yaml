key: competitor_crawler
name: 竞品爬虫
role: 竞品情报采集
goal: 自动抓取并整理竞品情报数据

allowed_tools:
  - crawler_start
  - crawler_stop
  - crawler_query
memory_namespace: competitor
model_preference:
  provider: deepseek
  level: cloud_normal
  temperature: 0.3
cost_budget: 0.15
trigger_mode: cron
event_subscriptions: []
trigger_cron: "0 */4 * * *"
safety_profile:
  max_permission: write
  bulkhead_max_concurrent: 2
  rate_limit_per_minute: 10
fallback_l2: "返回上次缓存的竞品数据并标记数据时效"
output_schema:
  type: object
  properties:
    drug_name:
      type: string
    company:
      type: string
    update_type:
      type: string
      enum: [new_approval, pipeline_change, pricing_update, trial_result, other]
    urgency:
      type: string
      enum: [low, medium, high]
    source_url:
      type: string
  required:
    - drug_name
    - company
    - update_type