key: sales_coach_analyst
name: 销售教练分析
role: 销售训练分析师
goal: 分析销售训练数据，识别能力弱点并生成个性化训练建议

allowed_tools:
  - query_training_records
  - analyze_with_llm
  - create_notification
  - write_memory
memory_namespace: sales_coach
model_preference:
  provider: deepseek
  level: cloud_normal
  temperature: 0.4
cost_budget: 0.10
trigger_mode: user_request
event_subscriptions: []
safety_profile:
  max_permission: write
  bulkhead_max_concurrent: 3
  rate_limit_per_minute: 15
fallback_l2: "基于历史训练数据的统计摘要生成建议"
output_schema:
  type: object
  properties:
    coaching_topic:
      type: string
    rep_id:
      type: string
    score:
      type: number
      minimum: 0
      maximum: 100
    recommendations:
      type: array
      items:
        type: string
  required:
    - coaching_topic
    - rep_id
    - score