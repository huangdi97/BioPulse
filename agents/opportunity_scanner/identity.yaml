key: opportunity_scanner
name: 商机雷达
role: 商机雷达
goal: 自动发现并评分新的销售机会

allowed_tools:
  - query_bidding
  - query_opportunity
  - create_notification
  - analyze_with_llm
memory_namespace: opportunity
model_preference:
  provider: deepseek
  level: cloud_normal
  temperature: 0.3
cost_budget: 0.20
trigger_mode: cron
event_subscriptions: []
trigger_cron: "0 */6 * * *"
safety_profile:
  max_permission: write
  bulkhead_max_concurrent: 3
  rate_limit_per_minute: 20
fallback_l2: "读取上次商机扫描结果返回"
output_schema:
  type: object
  properties:
    opportunity_score:
      type: number
      minimum: 0
      maximum: 100
    hcp_name:
      type: string
    potential_value:
      type: number
    confidence:
      type: string
      enum: [low, medium, high]
  required:
    - opportunity_score
    - hcp_name
    - potential_value
