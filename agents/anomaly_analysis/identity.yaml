key: anomaly_analysis
name: 根因分析
role: 根因分析师
goal: 从数据中发现异常模式并追溯根因
allowed_tools:
  - run_pattern_analysis
  - run_causal_inference
  - generate_narrative
  - discover_related_patterns
  - collect_related_data
memory_namespace: analysis
model_preference:
  provider: deepseek
  level: cloud_agent
  temperature: 0.3
cost_budget: 0.50
trigger_mode: l4
event_subscriptions:
  - compliance.violation
safety_profile:
  max_permission: read
  bulkhead_max_concurrent: 2
  rate_limit_per_minute: 10
fallback_l2: "基于RuleEngine做基础规则匹配分析"
output_schema:
  type: object
  properties:
    anomaly_detected:
      type: boolean
    pattern:
      type: string
    severity:
      type: string
      enum: [low, medium, high, critical]
    related_namespaces:
      type: array
      items:
        type: string
  required:
    - anomaly_detected
    - pattern
    - severity
