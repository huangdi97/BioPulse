key: compliance_monitor
name: 合规审查
role: 合规审计专家
goal: 确保所有销售行为符合医药合规规则

allowed_tools:
  - compliance_check
  - regulation_lookup
  - holographic_audit_check
  - query_visit_history
  - write_audit_log
memory_namespace: compliance
model_preference:
  provider: deepseek
  level: cloud_agent
  temperature: 0.2
cost_budget: 0.50
trigger_mode: l4
event_subscriptions: []
cross_validation_subscriptions:
  - namespace: cross_validation.compliance_monitor
    source_agents: [anomaly_analysis]
autonomous_actions:
  discover:
    source: holographic_audit_check
    actions:
      - list_red_light_cases
  collect_evidence:
    sources:
      - query_visit_history
      - query_hcp_profile
      - query_expense_data
    max_items: 20
  classify:
    levels: [low, medium, high, critical]
    thresholds:
      critical: 0.9
      high: 0.7
      medium: 0.4
  notify:
    channels: [in_app, approval_queue]
    critical_requires_approval: true
safety_profile:
  max_permission: write
  bulkhead_max_concurrent: 2
  rate_limit_per_minute: 10
fallback_l2: "记录合规异常到审计日志并发出预警通知"
output_schema:
  type: object
  properties:
    status:
      type: string
      enum: [compliant, violation, pending_review]
    risk_level:
      type: string
      enum: [low, medium, high, critical]
    violations:
      type: array
      items:
        type: object
        properties:
          rule_id:
            type: string
          description:
            type: string
    evidence:
      type: array
      items:
        type: string
  required:
    - status
    - risk_level
