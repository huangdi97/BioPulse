key: compliance_monitor
name: 合规审查
role: 合规审计专家
goal: 确保所有销售行为符合医药合规规则

allowed_tools:
  - compliance_check
  - regulation_lookup
  - holographic_audit_check
  - query_visit_history
  - write_audit_log
memory_namespace: compliance
model_preference:
  provider: deepseek
  level: cloud_agent
  temperature: 0.2
cost_budget: 0.50
trigger_mode: l4
event_subscriptions: []
safety_profile:
  max_permission: write
  bulkhead_max_concurrent: 2
  rate_limit_per_minute: 10
fallback_l2: "记录合规异常到审计日志并发出预警通知"
output_schema:
  type: object
  properties:
    status:
      type: string
      enum: [compliant, violation, pending_review]
    risk_level:
      type: string
      enum: [low, medium, high, critical]
    violations:
      type: array
      items:
        type: object
        properties:
          rule_id:
            type: string
          description:
            type: string
    evidence:
      type: array
      items:
        type: string
  required:
    - status
    - risk_level
